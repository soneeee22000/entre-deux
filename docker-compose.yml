services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://entredeux:entredeux_dev@db:5432/entredeux
      DATABASE_URL_SYNC: postgresql://entredeux:entredeux_dev@db:5432/entredeux
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn src.main:app --reload --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: entredeux
      POSTGRES_USER: entredeux
      POSTGRES_PASSWORD: entredeux_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entredeux -d entredeux"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
